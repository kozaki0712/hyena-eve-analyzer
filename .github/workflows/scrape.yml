name: Daily Scrape & Deploy

on:
  schedule:
    - cron: '0 17 * * *'   # 毎日 2:00 JST (= 17:00 UTC)
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: スクレイピングしてデータをコミット ─────────────────
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        run: node scripts/scrape-all.js

      - name: Commit & push scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/halls/
          git diff --staged --quiet \
            || git commit -m "chore: update hall data $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push

  # ── Job 2: Viteビルドして GitHub Pages にデプロイ ────────────
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # scrapeジョブのコミット後を取得

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
